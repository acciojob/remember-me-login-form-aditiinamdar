<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <style>
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 500; }
    input[type="text"], input[type="password"] {
      width: 100%; max-width: 320px; padding: 0.5rem;
    }
  </style>
</head>
<body>

<h1>Login Form</h1>

<form id="loginForm">
  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Username" required>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" required>
  </div>

  <div class="form-group">
    <input type="checkbox" id="remember" name="remember">
    <label for="remember">Remember me</label>
  </div>

  <button type="submit" id="submit">Login</button>
</form>

<button id="existing" style="display:none; margin-top: 1rem;">
  Login as existing user
</button>

<script>
// ────────────────────────────────────────────────
const form     = document.getElementById('loginForm');
const user     = document.getElementById('username');
const pass     = document.getElementById('password');
const remember = document.getElementById('remember');
const existing = document.getElementById('existing');

const KEY = 'rememberMeCredentials';

function updateExistingButton() {
  existing.style.display = localStorage.getItem(KEY) ? 'block' : 'none';
}

function loadSavedCredentials() {
  const saved = localStorage.getItem(KEY);
  if (!saved) return;

  try {
    const data = JSON.parse(saved);
    user.value = data.username || '';
    pass.value = data.password || '';
    remember.checked = !!data.username; // optional: check the box if credentials exist
  } catch {
    localStorage.removeItem(KEY);
  }
  updateExistingButton();
}

loadSavedCredentials(); // run on page load

form.addEventListener('submit', e => {
  e.preventDefault();
  
  const username = user.value.trim();
  if (!username) {
    alert('Please enter a username');
    return;
  }

  alert(`Logged in as ${username}`);

  if (remember.checked) {
    localStorage.setItem(KEY, JSON.stringify({
      username,
      password: pass.value
    }));
  } else {
    localStorage.removeItem(KEY);
  }

  updateExistingButton();
});

existing.addEventListener('click', () => {
  const data = localStorage.getItem(KEY);
  if (!data) return;

  try {
    const { username } = JSON.parse(data);
    if (username) {
      alert(`Logged in as ${username}`);
      // Optional: you could also auto-fill and submit the form here
    }
  } catch {
    localStorage.removeItem(KEY);
    updateExistingButton();
  }
});
// ────────────────────────────────────────────────
</script>

</body>
</html>
